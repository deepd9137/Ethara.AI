name: E2E (Playwright)

# Doesn't block PR merges — runs nightly + on-demand.
on:
  workflow_dispatch: {}
  schedule:
    # 03:00 UTC every day
    - cron: "0 3 * * *"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Golden path
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ttm
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ttm
      JWT_SECRET: ci-e2e-jwt-secret
      JWT_REFRESH_SECRET: ci-e2e-jwt-refresh-secret
      FRONTEND_URLS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      # --- Backend ---
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install backend deps
        working-directory: apps/api
        run: uv sync --all-groups

      - name: Migrate database
        working-directory: apps/api
        run: uv run alembic upgrade head

      - name: Start backend
        working-directory: apps/api
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../../api.log 2>&1 &
          echo $! > ../../api.pid
          # Wait for readiness
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/v1/health/live > /dev/null 2>&1; then
              echo "backend up"; exit 0
            fi
            sleep 1
          done
          echo "backend never became ready"; cat ../../api.log; exit 1

      # --- Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm e2e:install

      - name: Start frontend dev server
        working-directory: apps/web
        run: |
          pnpm dev > ../../web.log 2>&1 &
          echo $! > ../../web.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5173 > /dev/null 2>&1; then
              echo "frontend up"; exit 0
            fi
            sleep 1
          done
          echo "frontend never became ready"; cat ../../web.log; exit 1

      # --- E2E ---
      - name: Run Playwright tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            api.log
            web.log
          retention-days: 7
